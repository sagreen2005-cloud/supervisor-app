<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Supervisor App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Supervisor App</h1>
    <p>Local-only employee tracking system</p>
  </header>

  <main>
    <section class="card">
      <h2>Add Employee</h2>

      <input id="firstName" placeholder="First Name" />
      <input id="lastName" placeholder="Last Name" />
      <input id="badge" placeholder="Badge Number" />
      <input id="phone" placeholder="Phone Number" />
      <input id="email" placeholder="Email" />
      <input id="assignment" placeholder="Assignment / Shift" />

      <button id="saveEmployeeBtn">Save Employee</button>
    </section>

    <section class="card">
      <h2>Employees</h2>
      <input id="searchBox" placeholder="Search employees..." />
      <div id="employeeList"></div>
    </section>
  </main>

  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
