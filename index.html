<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Supervisor Command Center</title>
  <link rel="stylesheet" href="./styles.css?v=22.1" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Supervisor Command Center</h1>
      <p>Local-only personnel, supervision, and shift management</p>
    </div>

    <div class="header-actions">
      <button onclick="chooseBackupFolder()">Set Backup Folder</button>
      <button onclick="backupNow()">Backup Now</button>
    </div>
  </header>

  <div id="container">
    <nav class="sidebar">
      <div class="nav-section">
        <div class="nav-label">Home</div>
        <button onclick="showPage('dashboard')">🏠 Dashboard</button>
      </div>

      <div class="nav-section">
        <div class="nav-label">Personnel</div>
        <button onclick="showPage('employees')">👮 Employees</button>
        <button onclick="showPage('evaluations')">📋 Evaluations</button>
        <button onclick="showPage('performance')">⭐ Performance</button>
      </div>

      <div class="nav-section">
        <div class="nav-label">Supervision</div>
        <button onclick="showPage('rollcall')">📝 Daily Log</button>
        <button onclick="showPage('tasks')">✅ Tasks</button>
        <button onclick="showPage('reportReviews')">📄 Report Reviews</button>
      </div>

      <div class="nav-section">
        <div class="nav-label">Scheduling</div>
        <button onclick="showPage('calendar')">📅 Calendar</button>
      </div>

      <div class="nav-section">
        <div class="nav-label">Documents</div>
        <button onclick="showPage('files')">📁 Files</button>
      </div>

      <div class="nav-section">
        <div class="nav-label">System</div>
        <button onclick="showPage('settings')">⚙️ Settings</button>
      </div>
    </nav>

    <main id="content"></main>
  </div>

  <script src="./db.js?v=21"></script>
  <script src="./backup.js?v=21"></script>
  <script src="./dashboard.js?v=21"></script>
  <script src="./quick-actions.js?v=21"></script>
  <script src="./employees-list.js?v=21"></script>
  <script src="./employee-profile.js?v=21"></script>
  <script src="./employee-notes.js?v=21"></script>
  <script src="./employee-training.js?v=21"></script>
  <script src="./employee-schedule.js?v=21"></script>
  <script src="./report-reviews.js?v=21"></script>
  <script src="./performance.js?v=21"></script>
  <script src="./evaluations.js?v=21"></script>
  <script src="./roll-call.js?v=21"></script>
  <script src="./tasks.js?v=21"></script>
  <script src="./files.js?v=21"></script>
  <script src="./calendar.js?v=21"></script>
  <script src="./settings.js?v=21"></script>
  <script src="./navigation.js?v=21"></script>
